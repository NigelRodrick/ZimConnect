name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "zimconnect-mobile/**"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zimconnect-mobile
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zimconnect-mobile/package-lock.json

      - name: Validate required secrets
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is not configured."
            echo "Add it in GitHub: Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build APK with EAS
        id: eas_build
        run: |
          npx eas-cli build --platform android --profile preview --non-interactive --wait --json > eas-build.json
          node -e "const fs=require('fs');const raw=fs.readFileSync('eas-build.json','utf8').trim();const data=JSON.parse(raw);const build=Array.isArray(data)?data[0]:data;const out=process.env.GITHUB_OUTPUT;fs.appendFileSync(out,`build_id=${build.id||''}\n`);fs.appendFileSync(out,`build_page=${build.buildDetailsPageUrl||''}\n`);fs.appendFileSync(out,`apk_url=${(build.artifacts&&build.artifacts.buildUrl)||''}\n`);"

      - name: Download APK
        if: steps.eas_build.outputs.apk_url != ''
        run: |
          curl -L "${{ steps.eas_build.outputs.apk_url }}" -o zimconnect-preview.apk

      - name: Upload APK artifact
        if: steps.eas_build.outputs.apk_url != ''
        uses: actions/upload-artifact@v4
        with:
          name: zimconnect-preview-apk
          path: zimconnect-mobile/zimconnect-preview.apk

      - name: Build summary
        run: |
          echo "EAS build id: ${{ steps.eas_build.outputs.build_id }}"
          echo "EAS build page: ${{ steps.eas_build.outputs.build_page }}"
          if [ -n "${{ steps.eas_build.outputs.apk_url }}" ]; then
            echo "APK URL: ${{ steps.eas_build.outputs.apk_url }}"
          else
            echo "APK URL was not returned by EAS."
          fi
